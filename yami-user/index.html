<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yami Creator Program — Prototype Directory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    body.iframe-mode {
      background: none;
      padding: 0;
      display: block;
    }
    .slide {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      max-width: 720px;
      width: 100%;
      padding: 56px 48px;
    }
    .slide-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .slide-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    .slide-header h1 .red-dot { color: #e53935; }
    .slide-header p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }
    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .version-badge.v-with-report {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }
    .version-badge svg { width: 14px; height: 14px; }
    .card-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 28px 28px 24px;
      transition: all 0.2s ease;
      position: relative;
    }
    .card:hover {
      border-color: #d0d0d0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon.frontend { background: #fef3f2; }
    .card-icon.admin { background: #f0f4ff; }
    .card-icon.figma { background: #fdf4f0; }
    .card-icon svg { width: 22px; height: 22px; }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    .card-action {
      margin-top: 18px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: #111;
      color: #fff;
    }
    .btn-primary:hover { background: #333; }
    .btn-figma {
      background: #1e1e1e;
      color: #fff;
    }
    .btn-figma:hover { background: #333; }
    .btn svg { width: 16px; height: 16px; }
    .footer-note {
      text-align: center;
      margin-top: 36px;
      font-size: 13px;
      color: #999;
    }
    #app-frame {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 9999;
    }
    #app-frame.active { display: block; }
    #directory { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #directory.hidden { display: none; }
    @media (max-width: 600px) {
      .slide { padding: 36px 24px; border-radius: 20px; }
      .slide-header h1 { font-size: 22px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="directory">
    <div class="slide">
      <div class="slide-header">
        <h1>Yami<span class="red-dot">.</span> Creator Program</h1>
        <p>Prototype Directory</p>
        <div class="version-badge v-with-report">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          版本 A — 含独立 Report 页面
        </div>
      </div>

      <div class="card-grid">
        <!-- 1. 创作者前台 -->
        <div class="card">
          <div class="card-top">
            <div class="card-icon frontend">
              <svg viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div>
              <div class="card-title">创作者前台</div>
              <div class="card-desc">包括 Influencer 和 Affiliate Landing Page 及工作台。在任何页面刷新即可返回本目录页。</div>
            </div>
          </div>
          <div class="card-action">
            <a href="#" onclick="openApp(); return false;" class="btn btn-primary">
              点击预览
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </a>
          </div>
        </div>

        <!-- 2. 管理后台 -->
        <div class="card">
          <div class="card-top">
            <div class="card-icon admin">
              <svg viewBox="0 0 24 24" fill="none" stroke="#4a6cf7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
            </div>
            <div>
              <div class="card-title">管理后台</div>
              <div class="card-desc">管理创作者、佣金、商品及打款的后台。</div>
            </div>
          </div>
          <div class="card-action">
            <a href="https://yami-affiliate-admin.pages.dev/" target="_blank" class="btn btn-primary">
              点击预览
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </a>
          </div>
        </div>

        <!-- 3. Yami 商城 -->
        <div class="card">
          <div class="card-top">
            <div class="card-icon figma">
              <svg viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                <path d="M19 28.5C19 23.2533 23.2533 19 28.5 19C33.7467 19 38 23.2533 38 28.5C38 33.7467 33.7467 38 28.5 38C23.2533 38 19 33.7467 19 28.5Z" fill="#1ABCFE"/>
                <path d="M0 47.5C0 42.2533 4.25329 38 9.5 38H19V47.5C19 52.7467 14.7467 57 9.5 57C4.25329 57 0 52.7467 0 47.5Z" fill="#0ACF83"/>
                <path d="M19 0V19H28.5C33.7467 19 38 14.7467 38 9.5C38 4.25329 33.7467 0 28.5 0H19Z" fill="#FF7262"/>
                <path d="M0 9.5C0 14.7467 4.25329 19 9.5 19H19V0H9.5C4.25329 0 0 4.25329 0 9.5Z" fill="#F24E1E"/>
                <path d="M0 28.5C0 33.7467 4.25329 38 9.5 38H19V19H9.5C4.25329 19 0 23.2533 0 28.5Z" fill="#A259FF"/>
              </svg>
            </div>
            <div>
              <div class="card-title">Yami 商城</div>
              <div class="card-desc">包括用户访问 Influencer 和 Affiliate 的前台入口、用户浏览商品详情页时获取专属链接的设计稿。</div>
            </div>
          </div>
          <div class="card-action">
            <a href="https://www.figma.com/design/b15tWcTPaABRuMNFjEyjxm/Affiliate-Program?node-id=309-22548&t=Xgoq3Z7R8ZuHxvIm-1" target="_blank" class="btn btn-figma">
              <svg viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
                <path d="M19 28.5C19 23.2533 23.2533 19 28.5 19C33.7467 19 38 23.2533 38 28.5C38 33.7467 33.7467 38 28.5 38C23.2533 38 19 33.7467 19 28.5Z" fill="#1ABCFE"/>
                <path d="M0 47.5C0 42.2533 4.25329 38 9.5 38H19V47.5C19 52.7467 14.7467 57 9.5 57C4.25329 57 0 52.7467 0 47.5Z" fill="#0ACF83"/>
                <path d="M19 0V19H28.5C33.7467 19 38 14.7467 38 9.5C38 4.25329 33.7467 0 28.5 0H19Z" fill="#FF7262"/>
                <path d="M0 9.5C0 14.7467 4.25329 19 9.5 19H19V0H9.5C4.25329 0 0 4.25329 0 9.5Z" fill="#F24E1E"/>
                <path d="M0 28.5C0 33.7467 4.25329 38 9.5 38H19V19H9.5C4.25329 19 0 23.2533 0 28.5Z" fill="#A259FF"/>
              </svg>
              查看设计稿
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>
        </div>
      </div>

      <div class="footer-note">Yami Creator Program · Prototype · 2026</div>
    </div>
  </div>

  <iframe id="app-frame" src="about:blank"></iframe>

  <script>
    function openApp() {
      document.getElementById('directory').classList.add('hidden');
      document.body.classList.add('iframe-mode');
      var frame = document.getElementById('app-frame');
      frame.src = 'app.html';
      frame.classList.add('active');
    }
  </script>
</body>
</html>
