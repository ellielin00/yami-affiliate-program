<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Not Found — Yami</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ui-primary: #E00000;
  --red-50: #FBF1EF;
  --neutral-50: #FAFAFA;
  --neutral-100: #F5F5F5;
  --neutral-200: #EBEBEB;
  --neutral-500: #949494;
  --neutral-900: #222222;
  --neutral-950: #0A0A0A;
  --text-primary: rgba(0,0,0,0.87);
  --text-secondary: rgba(0,0,0,0.55);
  --border-default: rgba(0,0,0,0.08);
  --radius-lg: 12px;
  --transition: 200ms ease;
  --font-main: "GT Walsheim", "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  --max-width: 1200px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-main); color: var(--text-primary); background: var(--neutral-50); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<!-- Top Bar -->
<div style="background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border-default);height:64px;">
  <div style="max-width:var(--max-width);margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:100%;">
    <div style="display:flex;align-items:center;gap:4px;">
      <img src="yami-logo.png" alt="Yami" style="height:44px;width:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span style="display:none;font-size:20px;font-weight:500;color:var(--neutral-950);">Yami<span style="color:var(--ui-primary);">.</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="https://www.yami.com/en/cart" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--neutral-100);color:var(--text-secondary);transition:all var(--transition);" onmouseover="this.style.background='var(--neutral-200)'" onmouseout="this.style.background='var(--neutral-100)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </a>
      <a href="https://www.yami.com/en/hot-sale?tp=1&track=display-4236524-a0-view_more&bu_type=display&module_name=cms_component_hot-sale&index=0&content=hot-sale&cfid=4236524&item_scope=1" style="background:var(--ui-primary);color:#fff;padding:0 20px;height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:500;">View Best Sellers</a>
    </div>
  </div>
</div>

<!-- Not Found Content -->
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;">
  <div style="text-align:center;max-width:480px;">
    <!-- Empty State Illustration -->
    <div style="width:120px;height:120px;margin:0 auto 32px;background:var(--neutral-100);border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--neutral-500)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <line x1="1" y1="1" x2="23" y2="23" stroke="var(--neutral-500)" stroke-width="2"/>
      </svg>
    </div>
    
    <h1 style="font-size:28px;font-weight:600;color:var(--neutral-950);margin-bottom:12px;">Collection Not Found</h1>
    <p style="font-size:16px;color:var(--text-secondary);line-height:1.6;margin-bottom:32px;">
      This collection may have been removed or the link is no longer valid. Check out our best sellers instead!
    </p>
    
    <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
      <a href="https://www.yami.com/en/hot-sale?tp=1&track=display-4236524-a0-view_more&bu_type=display&module_name=cms_component_hot-sale&index=0&content=hot-sale&cfid=4236524&item_scope=1" style="background:var(--ui-primary);color:#fff;padding:14px 32px;border-radius:8px;font-size:15px;font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:all var(--transition);" onmouseover="this.style.background='#c00'" onmouseout="this.style.background='var(--ui-primary)'">
        Browse Best Sellers
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a href="https://www.yami.com" style="color:var(--text-secondary);font-size:14px;padding:8px 16px;transition:color var(--transition);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
        Go to Yami Homepage
      </a>
    </div>
  </div>
</div>

<!-- Footer -->
<div style="text-align:center;padding:32px 24px;border-top:1px solid var(--border-default);background:#fff;">
  <p style="font-size:13px;color:var(--neutral-500);">Powered by <strong style="color:var(--neutral-950);">Yami</strong><span style="color:var(--ui-primary);">.</span> Creators</p>
</div>

</body>
</html>
