<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Not Found — Yami</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ui-primary: #E00000;
  --neutral-50: #FAFAFA;
  --neutral-500: #949494;
  --neutral-950: #0A0A0A;
  --text-primary: rgba(0,0,0,0.87);
  --text-secondary: rgba(0,0,0,0.55);
  --border-default: rgba(0,0,0,0.08);
  --font-main: "GT Walsheim", "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  --max-width: 1200px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-main); color: var(--text-primary); background: var(--neutral-50); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<!-- Top Bar -->
<div style="background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border-default);height:64px;position:sticky;top:0;z-index:10;">
  <div style="max-width:var(--max-width);margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:100%;">
    <div style="display:flex;align-items:center;gap:4px;">
      <img src="yami-logo.png" alt="Yami" style="height:44px;width:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span style="display:none;font-size:20px;font-weight:500;color:var(--neutral-950);">Yami<span style="color:var(--ui-primary);">.</span></span>
    </div>
    <a href="https://www.yami.com" style="background:var(--ui-primary);color:#fff;padding:0 20px;height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:500;">Shop on Yami</a>
  </div>
</div>

<!-- Not Found Content -->
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;">
  <div style="text-align:center;max-width:480px;">
    <div style="margin-bottom:24px;"><img src="Images/empty.png" alt="" style="width:120px;height:auto;margin:0 auto;display:block;"></div>
    <h1 style="font-size:28px;font-weight:500;color:var(--neutral-950);margin-bottom:12px;letter-spacing:-0.02em;">Collection Not Found</h1>
    <p style="font-size:16px;color:var(--text-secondary);line-height:1.6;margin-bottom:24px;">This collection may have been removed or the link is no longer valid.</p>
    <p style="font-size:14px;color:var(--neutral-500);margin-bottom:32px;">Redirecting to Yami homepage in <span id="countdown">3</span> seconds...</p>
    <a href="https://www.yami.com" style="display:inline-flex;align-items:center;justify-content:center;background:var(--ui-primary);color:#fff;padding:0 28px;height:48px;border-radius:8px;font-size:16px;font-weight:500;">Go to Yami Homepage</a>
  </div>
</div>

<!-- Footer -->
<div style="text-align:center;padding:32px 24px;border-top:1px solid var(--border-default);background:#fff;">
  <p style="font-size:13px;color:var(--neutral-500);">Powered by <strong style="color:var(--neutral-950);">Yami</strong><span style="color:var(--ui-primary);">.</span> Creators</p>
</div>

<script>
// Countdown and auto-redirect
var seconds = 3;
var countdownEl = document.getElementById('countdown');
var timer = setInterval(function() {
  seconds--;
  countdownEl.textContent = seconds;
  if (seconds <= 0) {
    clearInterval(timer);
    window.location.href = 'https://www.yami.com';
  }
}, 1000);
</script>

</body>
</html>
